<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Disk Scheduling Visualizer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Disk Scheduling Visualizer</h1>
  <p>Interactive OS Algorithm Simulator</p>
</header>

<div class="container">

  <!-- INPUT PANEL -->
  <div class="card">
    <h2>Input</h2>

    <label>Disk Size</label>
    <input type="number" id="diskSize" placeholder="e.g. 200">

    <label>Request Queue</label>
    <input type="text" id="queue" placeholder="98,183,37,122,14,124,65,67">

    <label>Initial Head Position</label>
    <input type="number" id="head">

    <label>Direction</label>
    <select id="direction">
      <option value="left">Left</option>
      <option value="right">Right</option>
    </select>

    <!-- NEW FEATURE -->
    <label>Select Algorithm</label>
    <select id="algorithm">
      <option value="fcfs">FCFS</option>
      <option value="sstf">SSTF</option>
      <option value="scan">SCAN</option>
      <option value="cscan">C-SCAN</option>
      <option value="look">LOOK</option>
      <option value="clook">C-LOOK</option>
    </select>

    <div class="btn-group">
      <button onclick="runSimulation()">Run</button>
      <button onclick="stepMode()">Step Mode</button>
      <button onclick="compareAll()">Compare</button>
      <button onclick="loadExample()">Example</button>
      <button onclick="resetAll()">Reset</button>
    </div>
  </div>

  <!-- GRAPH -->
  <div class="card">
    <h2>Visualization</h2>
    <canvas id="chart"></canvas>
    <p id="stepInfo"></p>
  </div>

  <!-- METRICS -->
  <div class="card">
    <h2>Metrics</h2>
    <p>Total Seek: <span id="totalSeek">-</span></p>
    <p>Average Seek: <span id="avgSeek">-</span></p>
    <p>Sequence: <span id="sequence">-</span></p>
  </div>

  <!-- COMPARISON -->
  <div class="card">
    <h2>Comparison</h2>
    <table id="compareTable">
      <thead>
        <tr>
          <th>Algorithm</th>
          <th>Total Seek</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- EDUCATIONAL -->
  <div class="card">
    <h2>Algorithms Info</h2>
    <div id="info"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
